name: Benchmark Impact Engines

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/engine/**"
      - "scripts/bench-impact-engines.sh"
      - "bench-fixtures/**"
      - ".github/workflows/bench.yml"

permissions:
  contents: read

concurrency:
  group: bench-impact-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bench-impact:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install rust-analyzer component
        run: rustup component add rust-analyzer

      - name: Build release binary
        run: cargo build --release -q

      - name: Run TS vs LSP(strict) benchmark
        id: bench
        continue-on-error: true
        timeout-minutes: 12
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.base_ref }}"
            RUNS=1
          else
            BASE="origin/main"
            RUNS=2
          fi

          echo "base=$BASE runs=$RUNS" > bench-report.txt
          timeout 10m scripts/bench-impact-engines.sh \
            --base "$BASE" \
            --runs "$RUNS" \
            --direction callers \
            --lang rust \
            --rpc-counts \
            --save-ts-json bench-rust-ts.json \
            --save-lsp-json bench-rust-lsp.json \
            | tee -a bench-report.txt

      - name: Publish benchmark summary
        if: always()
        run: |
          {
            echo "## Impact engine benchmark"
            echo
            if [ -f bench-report.txt ]; then
              sed 's/^/`/;s/$/`/' bench-report.txt
            else
              echo "benchmark report missing"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-impact-engines
          path: |
            bench-report.txt
            bench-rust-ts.json
            bench-rust-lsp.json
          if-no-files-found: warn

  bench-go-strict-lsp:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      - name: Install gopls
        run: |
          go install golang.org/x/tools/gopls@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build release binary
        run: cargo build --release -q

      - name: Run Go strict-LSP benchmark
        timeout-minutes: 12
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            RUNS=1
          else
            RUNS=2
          fi

          echo "runs=$RUNS lang=go fixture=bench-fixtures/go-heavy.diff" > bench-go-report.txt
          timeout 10m scripts/bench-impact-engines.sh \
            --diff-file bench-fixtures/go-heavy.diff \
            --runs "$RUNS" \
            --direction callers \
            --lang go \
            --min-lsp-changed 6 \
            --min-lsp-impacted 15 \
            --save-ts-json bench-go-ts.json \
            --save-lsp-json bench-go-lsp.json \
            | tee -a bench-go-report.txt

      - name: Publish Go benchmark summary
        if: always()
        run: |
          {
            echo "## Go strict-LSP benchmark"
            echo
            if [ -f bench-go-report.txt ]; then
              sed 's/^/`/;s/$/`/' bench-go-report.txt
            else
              echo "go benchmark report missing"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Go benchmark artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-go-strict-lsp
          path: |
            bench-go-report.txt
            bench-go-ts.json
            bench-go-lsp.json
          if-no-files-found: warn

  bench-java-strict-lsp:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install jdtls
        run: |
          mkdir -p "$HOME/.local/jdtls" "$HOME/.local/bin"
          curl -fsSL "https://download.eclipse.org/jdtls/snapshots/jdt-language-server-latest.tar.gz" -o /tmp/jdtls.tar.gz
          tar -xzf /tmp/jdtls.tar.gz -C "$HOME/.local/jdtls"

          JDTLS_BIN="$(find "$HOME/.local/jdtls" -type f -name jdtls | head -n 1)"
          if [ -z "$JDTLS_BIN" ]; then
            echo "jdtls binary not found after extraction" >&2
            exit 1
          fi
          chmod +x "$JDTLS_BIN"
          ln -sf "$JDTLS_BIN" "$HOME/.local/bin/jdtls"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build release binary
        run: cargo build --release -q

      - name: Run Java strict-LSP benchmark
        timeout-minutes: 12
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            RUNS=1
          else
            RUNS=2
          fi

          echo "runs=$RUNS lang=java fixture=bench-fixtures/java-heavy.diff" > bench-java-report.txt
          timeout 10m scripts/bench-impact-engines.sh \
            --diff-file bench-fixtures/java-heavy.diff \
            --runs "$RUNS" \
            --direction callers \
            --lang java \
            --min-lsp-changed 7 \
            --min-lsp-impacted 15 \
            --save-ts-json bench-java-ts.json \
            --save-lsp-json bench-java-lsp.json \
            | tee -a bench-java-report.txt

      - name: Publish Java benchmark summary
        if: always()
        run: |
          {
            echo "## Java strict-LSP benchmark"
            echo
            if [ -f bench-java-report.txt ]; then
              sed 's/^/`/;s/$/`/' bench-java-report.txt
            else
              echo "java benchmark report missing"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Java benchmark artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-java-strict-lsp
          path: |
            bench-java-report.txt
            bench-java-ts.json
            bench-java-lsp.json
          if-no-files-found: warn

  bench-python-strict-lsp:
