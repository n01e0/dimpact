name: Benchmark Impact Engines

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/engine/**"
      - "scripts/bench-impact-engines.sh"
      - "bench-fixtures/**"
      - ".github/workflows/bench.yml"

permissions:
  contents: read

concurrency:
  group: bench-impact-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bench-impact:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install rust-analyzer component
        run: rustup component add rust-analyzer

      - name: Build release binary
        run: cargo build --release -q

      - name: Run TS vs Auto(strict-if-available) benchmark
        id: bench
        continue-on-error: true
        timeout-minutes: 12
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.base_ref }}"
            RUNS=1
          else
            BASE="origin/main"
            RUNS=2
          fi

          echo "base=$BASE runs=$RUNS compare=auto(strict-if-available)" > bench-report.txt
          timeout 10m scripts/bench-impact-engines.sh \
            --base "$BASE" \
            --runs "$RUNS" \
            --direction callers \
            --lang rust \
            --compare-auto-strict-if-available \
            --rpc-counts \
            --save-ts-json bench-rust-ts.json \
            --save-lsp-json bench-rust-auto-strict-if-available.json \
            | tee -a bench-report.txt

      - name: Publish benchmark summary
        if: always()
        run: |
          {
            echo "## Impact engine benchmark"
            echo
            if [ -f bench-report.txt ]; then
              sed 's/^/`/;s/$/`/' bench-report.txt
            else
              echo "benchmark report missing"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bench-impact-engines
          path: |
            bench-report.txt
            bench-rust-ts.json
            bench-rust-auto-strict-if-available.json
          if-no-files-found: warn

  bench-go-strict-lsp:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.22.x"

      - name: Install gopls
        run: |
          GOTOOLCHAIN=auto go install golang.org/x/tools/gopls@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build release binary
        run: cargo build --release -q

      - name: Run Go strict-LSP benchmark
        timeout-minutes: 12
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            RUNS=1
          else
            RUNS=2
          fi

          echo "runs=$RUNS lang=go fixture=bench-fixtures/go-heavy.diff" > bench-go-report.txt
          timeout 10m scripts/bench-impact-engines.sh \
            --diff-file bench-fixtures/go-heavy.diff \
            --runs "$RUNS" \
            --direction callers \
            --lang go \
            --min-lsp-changed 6 \
            --min-lsp-impacted 15 \
            --save-ts-json bench-go-ts.json \
            --save-lsp-json bench-go-lsp.json \
            | tee -a bench-go-report.txt

      - name: Publish Go benchmark summary
        if: always()
        run: |
          {
            echo "## Go strict-LSP benchmark"
            echo
            if [ -f bench-go-report.txt ]; then
              sed 's/^/`/;s/$/`/' bench-go-report.txt
            else
              echo "go benchmark report missing"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Go benchmark artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bench-go-strict-lsp
          path: |
            bench-go-report.txt
            bench-go-ts.json
            bench-go-lsp.json
          if-no-files-found: warn

  bench-java-strict-lsp:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Install jdtls
        run: |
          mkdir -p "$HOME/.local/jdtls" "$HOME/.local/bin"
          curl -fsSL "https://download.eclipse.org/jdtls/snapshots/jdt-language-server-latest.tar.gz" -o /tmp/jdtls.tar.gz
          tar -xzf /tmp/jdtls.tar.gz -C "$HOME/.local/jdtls"

          JDTLS_BIN="$(find "$HOME/.local/jdtls" -type f -name jdtls | head -n 1)"
          if [ -z "$JDTLS_BIN" ]; then
            echo "jdtls binary not found after extraction" >&2
            exit 1
          fi
          chmod +x "$JDTLS_BIN"
          ln -sf "$JDTLS_BIN" "$HOME/.local/bin/jdtls"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build release binary
        run: cargo build --release -q

      - name: Run Java strict-LSP benchmark
        timeout-minutes: 12
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            RUNS=1
          else
            RUNS=2
          fi

          echo "runs=$RUNS lang=java fixture=bench-fixtures/java-heavy.diff" > bench-java-report.txt
          timeout 10m scripts/bench-impact-engines.sh \
            --diff-file bench-fixtures/java-heavy.diff \
            --runs "$RUNS" \
            --direction callers \
            --lang java \
            --min-lsp-changed 7 \
            --min-lsp-impacted 15 \
            --save-ts-json bench-java-ts.json \
            --save-lsp-json bench-java-lsp.json \
            | tee -a bench-java-report.txt

      - name: Publish Java benchmark summary
        if: always()
        run: |
          {
            echo "## Java strict-LSP benchmark"
            echo
            if [ -f bench-java-report.txt ]; then
              sed 's/^/`/;s/$/`/' bench-java-report.txt
            else
              echo "java benchmark report missing"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Java benchmark artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bench-java-strict-lsp
          path: |
            bench-java-report.txt
            bench-java-ts.json
            bench-java-lsp.json
          if-no-files-found: warn

  bench-python-strict-lsp:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install Python LSP server (robust + fallback)
        id: install_python_lsp
        run: |
          set -euo pipefail

          INSTALL_LOG="bench-python-install.log"
          INSTALL_SUMMARY="bench-python-install-summary.txt"
          : > "$INSTALL_LOG"
          exec > >(tee -a "$INSTALL_LOG") 2>&1

          select_server() {
            local server="$1"
            echo "python_lsp=$server" >> "$GITHUB_OUTPUT"
            echo "INSTALL_RESULT=success python_lsp=$server" > "$INSTALL_SUMMARY"
            echo "[python-lsp] selected=$server"
          }

          echo "[python-lsp] node=$(node -v) npm=$(npm -v) python=$(python3 --version 2>&1)"

          # Primary: pyright
          if npm install -g pyright; then
            if command -v pyright-langserver >/dev/null 2>&1 && pyright --version >/tmp/pyright-version.log 2>&1; then
              select_server pyright
              cat /tmp/pyright-version.log
              exit 0
            fi
            echo "[python-lsp] pyright executable check failed, trying fallback" >&2
            cat /tmp/pyright-version.log >&2 || true
          else
            echo "[python-lsp] npm install pyright failed, trying fallback" >&2
          fi

          # Fallback-1: basedpyright
          if npm install -g basedpyright; then
            if command -v basedpyright-langserver >/dev/null 2>&1 && basedpyright --version >/tmp/basedpyright-version.log 2>&1; then
              select_server basedpyright
              cat /tmp/basedpyright-version.log
              exit 0
            fi
            echo "[python-lsp] basedpyright executable check failed, trying fallback-2" >&2
            cat /tmp/basedpyright-version.log >&2 || true
          else
            echo "[python-lsp] npm install basedpyright failed, trying fallback-2" >&2
          fi

          # Fallback-2: pylsp
          if python3 -m pip install --user --disable-pip-version-check python-lsp-server; then
            export PATH="$HOME/.local/bin:$PATH"
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
            if command -v pylsp >/dev/null 2>&1 && pylsp --version >/tmp/pylsp-version.log 2>&1; then
              select_server pylsp
              cat /tmp/pylsp-version.log
              exit 0
            fi
            cat /tmp/pylsp-version.log >&2 || true
          fi

          echo "INSTALL_RESULT=failure reason=no-usable-server candidates=pyright,basedpyright,pylsp" > "$INSTALL_SUMMARY"
          echo "::error::[python-lsp] failed to install a usable python LSP server (pyright/basedpyright/pylsp)" >&2
          exit 1

      - name: Build release binary
        run: cargo build --release -q

      - name: Run Python strict-LSP benchmark
        timeout-minutes: 12
        env:
          DIMPACT_PYTHON_LSP: ${{ steps.install_python_lsp.outputs.python_lsp }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            RUNS=1
          else
            RUNS=2
          fi

          echo "runs=$RUNS lang=python fixture=bench-fixtures/python-heavy.diff python_lsp=${DIMPACT_PYTHON_LSP}" > bench-python-report.txt
          timeout 10m scripts/bench-impact-engines.sh \
            --diff-file bench-fixtures/python-heavy.diff \
            --runs "$RUNS" \
            --direction callers \
            --lang python \
            --min-lsp-changed 3 \
            --min-lsp-impacted 5 \
            --save-ts-json bench-python-ts.json \
            --save-lsp-json bench-python-lsp.json \
            | tee -a bench-python-report.txt

      - name: Publish Python benchmark summary
        if: always()
        run: |
          {
            echo "## Python strict-LSP benchmark"
            echo
            echo "install step conclusion: `${{ steps.install_python_lsp.conclusion }}`"
            if [ -f bench-python-install-summary.txt ]; then
              echo
              echo "### install summary"
              sed 's/^/`/;s/$/`/' bench-python-install-summary.txt
            fi
            if [ -f bench-python-install.log ]; then
              echo
              echo "### install log (tail -n 80)"
              echo '```'
              tail -n 80 bench-python-install.log
              echo '```'
            fi
            echo
            if [ -f bench-python-report.txt ]; then
              sed 's/^/`/;s/$/`/' bench-python-report.txt
            else
              echo "python benchmark report missing"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Python benchmark artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bench-python-strict-lsp
          path: |
            bench-python-install.log
            bench-python-install-summary.txt
            bench-python-report.txt
            bench-python-ts.json
            bench-python-lsp.json
          if-no-files-found: warn

