name: Impact Analysis

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  impact:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: impact
        name: Run impact & format tables
        run: |
          MAX_CHANGED=50
          MAX_IMPACTED=5
          git fetch origin ${{ github.base_ref }} && \
          git diff --no-ext-diff origin/${{ github.base_ref }}...HEAD | \
          docker run -i --rm -v ${{ github.workspace }}:/work ghcr.io/n01e0/dimpact:latest impact --per-seed -f json | \
          jq -r --argjson max_changed "$MAX_CHANGED" --argjson max_impacted "$MAX_IMPACTED" '
          (.data // .) as $payload |
          "## Changed Symbols\n",
          "| Name | Kind | File | Range | Impacted Preview |",
          "|------|------|------|-------|------------------|",
          ($payload[:$max_changed][] | .changed_symbol as $c |
            "| `" + $c.name + "` | " +
            $c.kind + " | " +
            $c.file + " | " +
            ($c.range.start_line|tostring)+"-"+($c.range.end_line|tostring) + " | " +
            (
              [
                .impacts[]?.output.impacted_symbols[]?.name
              ]
              | unique as $names
              | if ($names | length) == 0 then
                  "None"
                else
                  (($names[:$max_impacted] | join(", "))
                   + if ($names | length) > $max_impacted then
                       ", ... (+" + (($names | length) - $max_impacted | tostring) + " more)"
                     else
                       ""
                     end)
                end
            ) +
            " |"
          ),
          (if ($payload | length) > $max_changed then
             "\n_Showing first " + ($max_changed|tostring) + " of " + (($payload | length)|tostring) + " changed symbols._"
           else empty end)
          ' > impact-tables.md

      - name: comment
        if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: impact-tables.md
