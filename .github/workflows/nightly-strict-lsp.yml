name: Nightly Strict real-LSP E2E

on:
  schedule:
    # 03:00 JST (18:00 UTC)
    - cron: "0 18 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-strict-lsp-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TARGET_DIR: ${{ github.workspace }}/target
  CARGO_TERM_COLOR: always

jobs:
  strict_real_lsp_e2e:
    runs-on: ubuntu-latest
    container: ghcr.io/n01e0/dimpact-ci:latest
    steps:
      - uses: actions/checkout@v6

      - name: Cache CARGO_HOME
        uses: actions/cache@v4
        with:
          path: ~/.cargo
          key: ${{ runner.os }}-cargo-home-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install TypeScript/JavaScript language server
        run: |
          npm install -g typescript typescript-language-server
          typescript-language-server --help >/dev/null

      - name: Run strict real-LSP engine_lsp suite (env-gated)
        env:
          DIMPACT_E2E_STRICT_LSP: "1"
        run: cargo test -q --test engine_lsp
