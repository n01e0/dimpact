name: Nightly Strict real-LSP E2E

on:
  schedule:
    # 03:00 JST (18:00 UTC)
    - cron: "0 18 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-strict-lsp-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TARGET_DIR: ${{ github.workspace }}/target
  CARGO_TERM_COLOR: always
  NIGHTLY_LOG_DIR: ${{ github.workspace }}/nightly-logs

jobs:
  strict_real_lsp_e2e:
    runs-on: ubuntu-latest
    container: ghcr.io/n01e0/dimpact-ci:latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Ensure base tools (git/bash/python3/nodejs/npm/ripgrep)
        shell: sh
        run: |
          if command -v apt-get >/dev/null 2>&1; then
            apt-get update
            DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
              git bash python3 nodejs npm ripgrep ca-certificates curl openjdk-17-jre-headless ruby-full
          elif command -v apk >/dev/null 2>&1; then
            apk add --no-cache git bash python3 nodejs npm ripgrep ca-certificates curl openjdk17-jre ruby ruby-dev
          elif command -v yum >/dev/null 2>&1; then
            yum install -y git bash python3 nodejs npm ripgrep ca-certificates curl java-17-openjdk-headless ruby ruby-devel
          else
            echo "no supported package manager found to install required base tools" >&2
            exit 1
          fi

      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Prepare nightly log directory
        run: |
          set -euo pipefail
          mkdir -p "$NIGHTLY_LOG_DIR"

      - name: Cache CARGO_HOME
        uses: actions/cache@v4
        with:
          path: ~/.cargo
          key: ${{ runner.os }}-cargo-home-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}

      - name: Install + health-check TypeScript/JavaScript language server
        continue-on-error: true
        run: |
          set -euo pipefail
          LOG="$NIGHTLY_LOG_DIR/install-ts-js.log"
          exec > >(tee -a "$LOG") 2>&1

          if ! node -v >/dev/null 2>&1 || ! npm -v >/dev/null 2>&1; then
            echo "::error::[ts/js] node/npm runtime not executable"
            echo "[ts/js] PATH=$PATH"
            exit 1
          fi

          echo "[ts/js] node=$(node -v) npm=$(npm -v)"

          install_ts_js() {
            npm install -g --no-audit --no-fund typescript@latest typescript-language-server@latest
          }

          if ! install_ts_js; then
            echo "[ts/js] first npm install failed, retrying once after npm cache clean"
            npm cache clean --force || true
            if ! install_ts_js; then
              echo "::error::[ts/js] npm install failed (typescript/typescript-language-server) after retry"
              exit 1
            fi
          fi

          if ! command -v typescript-language-server >/dev/null 2>&1; then
            echo "::error::[ts/js] typescript-language-server not found in PATH after install"
            exit 1
          fi

          echo "[ts/js] typescript-language-server path=$(command -v typescript-language-server)"
          if ! typescript-language-server --help >/tmp/typescript-language-server-help.log 2>&1; then
            echo "::error::[ts/js] typescript-language-server --help failed"
            cat /tmp/typescript-language-server-help.log >&2
            exit 1
          fi
          echo "[ts/js] health-check=ok"

      - name: Install + health-check Python language server
        continue-on-error: true
        run: |
          set -euo pipefail
          LOG="$NIGHTLY_LOG_DIR/install-python.log"
          exec > >(tee -a "$LOG") 2>&1

          if ! node -v >/dev/null 2>&1 || ! npm -v >/dev/null 2>&1; then
            echo "::error::[python] node/npm runtime not executable"
            echo "[python] PATH=$PATH"
            exit 1
          fi

          echo "[python] node=$(node -v) npm=$(npm -v)"

          install_pyright() {
            npm install -g --no-audit --no-fund pyright@latest
          }

          if ! install_pyright; then
            echo "[python] first npm install failed, retrying once after npm cache clean"
            npm cache clean --force || true
            if ! install_pyright; then
              echo "::error::[python] npm install failed (pyright) after retry"
              exit 1
            fi
          fi

          if ! command -v pyright-langserver >/dev/null 2>&1; then
            echo "::error::[python] pyright-langserver not found in PATH after install"
            exit 1
          fi
          if ! command -v pyright >/dev/null 2>&1; then
            echo "::error::[python] pyright CLI not found in PATH after install"
            exit 1
          fi

          echo "[python] pyright-langserver path=$(command -v pyright-langserver)"
          if ! pyright --version >/tmp/pyright-version.log 2>&1; then
            echo "::error::[python] pyright --version failed"
            cat /tmp/pyright-version.log >&2
            exit 1
          fi
          echo "[python] pyright version=$(cat /tmp/pyright-version.log | head -n 1)"
          echo "[python] health-check=ok"

      - uses: actions/setup-go@v6
        with:
          go-version: "1.22.x"

      - name: Install + health-check Go language server
        continue-on-error: true
        run: |
          set -euo pipefail
          LOG="$NIGHTLY_LOG_DIR/install-go.log"
          exec > >(tee -a "$LOG") 2>&1
          echo "[go] go=$(go version)"

          if ! GOTOOLCHAIN=auto go install golang.org/x/tools/gopls@latest; then
            echo "::error::[go] go install failed (gopls@latest)"
            exit 1
          fi

          GOBIN="$(go env GOPATH)/bin"
          export PATH="$GOBIN:$PATH"
          echo "$GOBIN" >> "$GITHUB_PATH"

          if ! command -v gopls >/dev/null 2>&1; then
            echo "::error::[go] gopls not found in PATH after install"
            exit 1
          fi

          echo "[go] gopls path=$(command -v gopls)"
          if ! gopls version >/tmp/gopls-version.log 2>&1; then
            echo "::error::[go] gopls version failed"
            cat /tmp/gopls-version.log >&2
            exit 1
          fi
          cat /tmp/gopls-version.log
          echo "[go] health-check=ok"

      - name: Install + health-check Java language server
        continue-on-error: true
        run: |
          set -euo pipefail
          LOG="$NIGHTLY_LOG_DIR/install-java.log"
          exec > >(tee -a "$LOG") 2>&1
          echo "[java] java=$(java -version 2>&1 | head -n 1)"

          mkdir -p "$HOME/.local/jdtls" "$HOME/.local/bin"
          if ! curl --retry 3 --retry-delay 2 --retry-all-errors -fsSL \
            "https://download.eclipse.org/jdtls/snapshots/jdt-language-server-latest.tar.gz" \
            -o /tmp/jdtls.tar.gz; then
            echo "::error::[java] failed to download jdtls snapshot tarball"
            exit 1
          fi

          if ! tar -xzf /tmp/jdtls.tar.gz -C "$HOME/.local/jdtls"; then
            echo "::error::[java] failed to extract /tmp/jdtls.tar.gz"
            exit 1
          fi

          JDTLS_BIN="$(find "$HOME/.local/jdtls" -type f -name jdtls | head -n 1)"
          if [ -z "$JDTLS_BIN" ]; then
            echo "::error::[java] jdtls binary not found after extraction"
            find "$HOME/.local/jdtls" -maxdepth 3 -type f | head -n 50 >&2 || true
            exit 1
          fi

          chmod +x "$JDTLS_BIN"
          ln -sf "$JDTLS_BIN" "$HOME/.local/bin/jdtls"
          export PATH="$HOME/.local/bin:$PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

          if ! command -v jdtls >/dev/null 2>&1; then
            echo "::error::[java] jdtls not found in PATH after install"
            exit 1
          fi

          echo "[java] jdtls path=$(command -v jdtls)"
          if ! jdtls --help >/tmp/jdtls-help.log 2>&1; then
            echo "::error::[java] jdtls --help failed"
            cat /tmp/jdtls-help.log >&2
            exit 1
          fi
          echo "[java] health-check=ok"

      - name: Install + health-check Ruby language server
        continue-on-error: true
        run: |
          set -euo pipefail
          LOG="$NIGHTLY_LOG_DIR/install-ruby.log"
          exec > >(tee -a "$LOG") 2>&1
          echo "[ruby] ruby=$(ruby -v) gem=$(gem --version)"

          if ! gem install ruby-lsp --no-document; then
            echo "::error::[ruby] gem install failed (ruby-lsp)"
            exit 1
          fi

          if ! command -v ruby-lsp >/dev/null 2>&1; then
            echo "::error::[ruby] ruby-lsp not found in PATH after install"
            exit 1
          fi

          echo "[ruby] ruby-lsp path=$(command -v ruby-lsp)"
          if ! ruby-lsp --help >/tmp/ruby-lsp-help.log 2>&1; then
            echo "::error::[ruby] ruby-lsp --help failed"
            cat /tmp/ruby-lsp-help.log >&2
            exit 1
          fi
          echo "[ruby] health-check=ok"

      - name: Preflight strict real-LSP targets (skip-safe)
        run: |
          set -euo pipefail
          LOG="$NIGHTLY_LOG_DIR/preflight.log"
          exec > >(tee -a "$LOG") 2>&1

          PRE_LOG="$NIGHTLY_LOG_DIR/engine-lsp-strict-preflight.log"
          : > "$PRE_LOG"

          set_gate() {
            local key="$1" enabled="$2" reason="$3"
            printf -v "$key" '%s' "$enabled"
            export "$key"
            echo "${key}=${enabled}" >> "$GITHUB_ENV"
            echo "${key}=${enabled} reason=${reason}" >> "$PRE_LOG"
          }

          has_cmd() {
            command -v "$1" >/dev/null 2>&1
          }

          if has_cmd rust-analyzer; then
            set_gate "DIMPACT_E2E_STRICT_LSP" "1" "rust-analyzer available"
            rust_reason="rust-analyzer available"
          else
            set_gate "DIMPACT_E2E_STRICT_LSP" "0" "rust-analyzer missing (skip-safe)"
            rust_reason="rust-analyzer missing (skip-safe)"
          fi

          if has_cmd typescript-language-server; then
            set_gate "DIMPACT_E2E_STRICT_LSP_TYPESCRIPT" "1" "typescript-language-server available"
            set_gate "DIMPACT_E2E_STRICT_LSP_JAVASCRIPT" "1" "typescript-language-server available (shared with TS)"
            ts_reason="typescript-language-server available"
            js_reason="typescript-language-server available (shared with TS)"
          else
            set_gate "DIMPACT_E2E_STRICT_LSP_TYPESCRIPT" "0" "typescript-language-server missing (skip-safe)"
            set_gate "DIMPACT_E2E_STRICT_LSP_JAVASCRIPT" "0" "typescript-language-server missing (skip-safe)"
            ts_reason="typescript-language-server missing (skip-safe)"
            js_reason="typescript-language-server missing (skip-safe)"
          fi

          if has_cmd gopls; then
            set_gate "DIMPACT_E2E_STRICT_LSP_GO" "1" "gopls available"
            go_reason="gopls available"
          else
            set_gate "DIMPACT_E2E_STRICT_LSP_GO" "0" "gopls missing (skip-safe)"
            go_reason="gopls missing (skip-safe)"
          fi

          if has_cmd jdtls; then
            set_gate "DIMPACT_E2E_STRICT_LSP_JAVA" "1" "jdtls available"
            java_reason="jdtls available"
          else
            set_gate "DIMPACT_E2E_STRICT_LSP_JAVA" "0" "jdtls missing (skip-safe)"
            java_reason="jdtls missing (skip-safe)"
          fi

          if has_cmd ruby-lsp; then
            set_gate "DIMPACT_E2E_STRICT_LSP_RUBY" "1" "ruby-lsp available"
            ruby_reason="ruby-lsp available"
          else
            set_gate "DIMPACT_E2E_STRICT_LSP_RUBY" "0" "ruby-lsp missing (skip-safe)"
            ruby_reason="ruby-lsp missing (skip-safe)"
          fi

          python_server=""
          python_reason="python LSP server missing (pyright-langserver/basedpyright-langserver/pylsp) (skip-safe)"
          if has_cmd pyright-langserver; then
            python_server="pyright"
            python_reason="pyright-langserver available"
          elif has_cmd basedpyright-langserver; then
            python_server="basedpyright"
            python_reason="basedpyright-langserver available"
          elif has_cmd pylsp; then
            python_server="pylsp"
            python_reason="pylsp available"
          fi

          if [ -n "$python_server" ]; then
            set_gate "DIMPACT_E2E_STRICT_LSP_PYTHON" "1" "$python_reason"
            echo "DIMPACT_PYTHON_LSP=$python_server" >> "$GITHUB_ENV"
            echo "DIMPACT_PYTHON_LSP=$python_server reason=selected by preflight" >> "$PRE_LOG"
          else
            set_gate "DIMPACT_E2E_STRICT_LSP_PYTHON" "0" "$python_reason"
          fi

          {
            echo "## strict real-LSP preflight"
            echo
            echo "| target | enabled | reason |"
            echo "|---|---:|---|"
            echo "| rust (global strict gate) | ${DIMPACT_E2E_STRICT_LSP:-unset} | ${rust_reason} |"
            echo "| typescript | ${DIMPACT_E2E_STRICT_LSP_TYPESCRIPT:-unset} | ${ts_reason} |"
            echo "| javascript | ${DIMPACT_E2E_STRICT_LSP_JAVASCRIPT:-unset} | ${js_reason} |"
            echo "| go | ${DIMPACT_E2E_STRICT_LSP_GO:-unset} | ${go_reason} |"
            echo "| java | ${DIMPACT_E2E_STRICT_LSP_JAVA:-unset} | ${java_reason} |"
            echo "| ruby | ${DIMPACT_E2E_STRICT_LSP_RUBY:-unset} | ${ruby_reason} |"
            echo "| python | ${DIMPACT_E2E_STRICT_LSP_PYTHON:-unset} | ${python_reason} |"
            if [ -n "$python_server" ]; then
              echo
              echo "python server selected: \`$python_server\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Summarize strict real-LSP migration status + residual trend
        if: always()
        run: |
          set -euo pipefail
          PROGRESS_MD="$NIGHTLY_LOG_DIR/strict-e2e-migration-summary.md"
          RESIDUAL_AFTER_JSON="$NIGHTLY_LOG_DIR/strict-e2e-residual-after.json"
          RESIDUAL_AFTER_MD="$NIGHTLY_LOG_DIR/strict-e2e-residual-after.md"
          RESIDUAL_BEFORE_JSON="$NIGHTLY_LOG_DIR/strict-e2e-residual-before.json"
          RESIDUAL_TREND_MD="$NIGHTLY_LOG_DIR/strict-e2e-residual-trend.md"

          bash scripts/summarize-strict-e2e-migration-progress.sh tests/engine_lsp.rs "$PROGRESS_MD"
          bash scripts/summarize-strict-e2e-skips.sh tests/engine_lsp.rs "$RESIDUAL_AFTER_JSON" "$RESIDUAL_AFTER_MD"

          if git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            git show HEAD^:tests/engine_lsp.rs > /tmp/engine_lsp.prev.rs
            bash scripts/summarize-strict-e2e-skips.sh /tmp/engine_lsp.prev.rs "$RESIDUAL_BEFORE_JSON" /tmp/strict-e2e-residual-before.md
          else
            cp "$RESIDUAL_AFTER_JSON" "$RESIDUAL_BEFORE_JSON"
          fi

          python3 scripts/render-strict-e2e-residual-trend.py \
            "$RESIDUAL_BEFORE_JSON" \
            "$RESIDUAL_AFTER_JSON" \
            > "$RESIDUAL_TREND_MD"

          cat "$PROGRESS_MD" >> "$GITHUB_STEP_SUMMARY"
          cat "$RESIDUAL_AFTER_MD" >> "$GITHUB_STEP_SUMMARY"
          cat "$RESIDUAL_TREND_MD" >> "$GITHUB_STEP_SUMMARY"

      - name: Run strict real-LSP engine_lsp suite (env-gated)
        id: strict_e2e_initial
        continue-on-error: true
        run: |
          set -euo pipefail
          LOG="$NIGHTLY_LOG_DIR/run-engine-lsp-strict.log"
          exec > >(tee -a "$LOG") 2>&1

          STRICT_E2E_LOG="$NIGHTLY_LOG_DIR/engine-lsp-strict-e2e.log"
          echo "::group::cargo test -q --test engine_lsp (strict real-LSP, env-gated)"
          set +e
          cargo test -q --test engine_lsp 2>&1 | tee "$STRICT_E2E_LOG"
          status=${PIPESTATUS[0]}
          set -e
          echo "::endgroup::"
          exit $status

      - name: Summarize strict E2E failure logs
        if: failure()
        run: |
          STRICT_E2E_LOG="$NIGHTLY_LOG_DIR/engine-lsp-strict-e2e.log"
          {
            echo "## strict real-LSP engine_lsp failure summary"
            if [ -f "$STRICT_E2E_LOG" ]; then
              echo
              echo "### engine-lsp-strict-e2e.log (tail -n 200)"
              echo '```'
              tail -n 200 "$STRICT_E2E_LOG"
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"


      - name: Run LSP graduation auto-check script
        id: grad_check_initial
        if: always()
        continue-on-error: true
        run: |
          set -euo pipefail
          LOG="$NIGHTLY_LOG_DIR/run-graduation-check.log"
          exec > >(tee -a "$LOG") 2>&1

          GRAD_LOG="$NIGHTLY_LOG_DIR/lsp-graduation-check.log"
          set +e
          scripts/verify-lsp-graduation.sh --skip-regression 2>&1 | tee "$GRAD_LOG"
          status=${PIPESTATUS[0]}
          set -e
          exit $status

      - name: Publish LSP graduation check summary
        if: always()
        run: |
          GRAD_LOG="$NIGHTLY_LOG_DIR/lsp-graduation-check.log"
          {
            echo "## LSP graduation auto-check summary"
            if [ -f "$GRAD_LOG" ]; then
              echo
              echo "### Result"
              if grep -E '^PASS=[0-9]+ FAIL=[0-9]+' "$GRAD_LOG" >/dev/null; then
                grep -E '^PASS=[0-9]+ FAIL=[0-9]+' "$GRAD_LOG"
              else
                echo "PASS/FAIL summary line not found"
              fi
              echo
              echo "### Full check log (tail -n 200)"
              echo '```'
              tail -n 200 "$GRAD_LOG"
              echo '```'
            else
              echo "graduation check log missing"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Classify nightly flaky causes
        if: always()
        run: |
          set -euo pipefail
          LOG="$NIGHTLY_LOG_DIR/run-flaky-classifier.log"
          exec > >(tee -a "$LOG") 2>&1

          scripts/classify-nightly-flaky.sh \
            "$NIGHTLY_LOG_DIR" \
            "$NIGHTLY_LOG_DIR/nightly-flaky-classification.json" \
            "$NIGHTLY_LOG_DIR/nightly-flaky-classification.md"

          cat "$NIGHTLY_LOG_DIR/nightly-flaky-classification.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Decide flaky-type retry policy
        id: retry_policy
        if: always()
        run: |
          set -euo pipefail
          LOG="$NIGHTLY_LOG_DIR/retry-policy.log"
          exec > >(tee -a "$LOG") 2>&1

          CLASS_JSON="$NIGHTLY_LOG_DIR/nightly-flaky-classification.json"
          python3 - "$CLASS_JSON" <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          p = Path(sys.argv[1])
          if p.exists():
              d = json.loads(p.read_text())
              totals = d.get("totals", {})
          else:
              totals = {}

          install = int(totals.get("install", 0))
          startup = int(totals.get("startup", 0))
          capability = int(totals.get("capability", 0))
          timeout = int(totals.get("timeout", 0))

          retry_install = install > 0
          retry_startup = startup > 0
          retry_timeout = timeout > 0
          retry_capability = capability > 0

          # Policy:
          # - install/startup/timeout: retry once
          # - capability-only: no retry (non-transient by default)
          retry_enabled = retry_install or retry_startup or retry_timeout

          out = Path(os.environ["GITHUB_OUTPUT"])
          with out.open("a", encoding="utf-8") as f:
              def w(k, v):
                  f.write(f"{k}={v}\n")
              w("install", "1" if retry_install else "0")
              w("startup", "1" if retry_startup else "0")
              w("capability", "1" if retry_capability else "0")
              w("timeout", "1" if retry_timeout else "0")
              w("enabled", "1" if retry_enabled else "0")

          print(f"retry_policy install={int(retry_install)} startup={int(retry_startup)} capability={int(retry_capability)} timeout={int(retry_timeout)} enabled={int(retry_enabled)}")
          PY


      - name: Publish flaky-type retry policy summary
        if: always()
        run: |
          {
            echo "## flaky-type retry policy"
            echo
            echo "| type | count>0 | auto-retry |"
            echo "|---|---:|---:|"
            echo "| install | ${{ steps.retry_policy.outputs.install }} | ${{ steps.retry_policy.outputs.install }} |"
            echo "| startup | ${{ steps.retry_policy.outputs.startup }} | ${{ steps.retry_policy.outputs.startup }} |"
            echo "| capability | ${{ steps.retry_policy.outputs.capability }} | 0 |"
            echo "| timeout | ${{ steps.retry_policy.outputs.timeout }} | ${{ steps.retry_policy.outputs.timeout }} |"
            echo
            echo "retry enabled: ${{ steps.retry_policy.outputs.enabled }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Retry setup actions for install/startup flaky types
        if: always() && steps.retry_policy.outputs.enabled == '1' && (steps.retry_policy.outputs.install == '1' || steps.retry_policy.outputs.startup == '1')
        run: |
          set -euo pipefail
          LOG="$NIGHTLY_LOG_DIR/retry-setup.log"
          exec > >(tee -a "$LOG") 2>&1

          echo "[retry] install/startup retry path"

          npm install -g typescript typescript-language-server pyright || true
          GOTOOLCHAIN=auto go install golang.org/x/tools/gopls@latest || true

          mkdir -p "$HOME/.local/jdtls" "$HOME/.local/bin"
          curl --retry 2 --retry-delay 2 --retry-all-errors -fsSL \
            "https://download.eclipse.org/jdtls/snapshots/jdt-language-server-latest.tar.gz" \
            -o /tmp/jdtls-retry.tar.gz || true
          tar -xzf /tmp/jdtls-retry.tar.gz -C "$HOME/.local/jdtls" || true
          JDTLS_BIN="$(find "$HOME/.local/jdtls" -type f -name jdtls | head -n 1 || true)"
          if [ -n "$JDTLS_BIN" ]; then
            chmod +x "$JDTLS_BIN"
            ln -sf "$JDTLS_BIN" "$HOME/.local/bin/jdtls"
          fi

          gem install ruby-lsp --no-document || true

          echo "[retry] setup retry completed (best effort)"

      - name: Retry strict real-LSP engine_lsp suite (policy-gated)
        id: strict_e2e_retry
        continue-on-error: true
        if: always() && steps.retry_policy.outputs.enabled == '1'
        env:
          DIMPACT_E2E_STRICT_LSP: "1"
          DIMPACT_E2E_STRICT_LSP_TYPESCRIPT: "1"
          DIMPACT_E2E_STRICT_LSP_JAVASCRIPT: "1"
          DIMPACT_E2E_STRICT_LSP_GO: "1"
          DIMPACT_E2E_STRICT_LSP_JAVA: "1"
          DIMPACT_E2E_STRICT_LSP_RUBY: "1"
          DIMPACT_E2E_STRICT_LSP_PYTHON: "1"
        run: |
          set -euo pipefail
          LOG="$NIGHTLY_LOG_DIR/run-engine-lsp-strict-retry.log"
          exec > >(tee -a "$LOG") 2>&1

          STRICT_E2E_RETRY_LOG="$NIGHTLY_LOG_DIR/engine-lsp-strict-e2e-retry.log"
          echo "::group::cargo test -q --test engine_lsp (strict real-LSP retry)"
          set +e
          cargo test -q --test engine_lsp 2>&1 | tee "$STRICT_E2E_RETRY_LOG"
          status=${PIPESTATUS[0]}
          set -e
          echo "::endgroup::"
          exit $status

      - name: Retry LSP graduation auto-check (policy-gated)
        id: grad_check_retry
        if: always() && steps.retry_policy.outputs.enabled == '1'
        continue-on-error: true
        run: |
          set -euo pipefail
          LOG="$NIGHTLY_LOG_DIR/run-graduation-check-retry.log"
          exec > >(tee -a "$LOG") 2>&1

          GRAD_RETRY_LOG="$NIGHTLY_LOG_DIR/lsp-graduation-check-retry.log"
          set +e
          scripts/verify-lsp-graduation.sh --skip-regression 2>&1 | tee "$GRAD_RETRY_LOG"
          status=${PIPESTATUS[0]}
          set -e
          exit $status

      - name: Finalize nightly result with retry policy
        if: always()
        run: |
          set -euo pipefail

          init_strict='${{ steps.strict_e2e_initial.outcome }}'
          init_grad='${{ steps.grad_check_initial.outcome }}'
          retry_enabled='${{ steps.retry_policy.outputs.enabled }}'
          retry_strict='${{ steps.strict_e2e_retry.outcome }}'
          retry_grad='${{ steps.grad_check_retry.outcome }}'

          strict_ok=0
          grad_ok=0

          if [ "$init_strict" = "success" ] || [ "$retry_strict" = "success" ]; then
            strict_ok=1
          fi

          if [ "$init_grad" = "success" ] || [ "$retry_grad" = "success" ]; then
            grad_ok=1
          fi

          echo "[finalize] strict initial=$init_strict strict retry=${retry_strict:-skipped} grad initial=$init_grad grad retry=${retry_grad:-skipped} retry enabled=$retry_enabled strict_ok=$strict_ok grad_ok=$grad_ok"

          {
            echo "## retry finalize"
            echo "- strict initial: $init_strict"
            echo "- strict retry: ${retry_strict:-skipped}"
            echo "- graduation initial: $init_grad"
            echo "- graduation retry: ${retry_grad:-skipped}"
            echo "- retry enabled: $retry_enabled"
            echo "- strict final ok: $strict_ok"
            echo "- graduation final ok: $grad_ok"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$strict_ok" -ne 1 ] || [ "$grad_ok" -ne 1 ]; then
            echo "nightly failed after applying retry policy" >&2
            exit 1
          fi

      - name: Publish failure triage summary (cause/language/repro)
        if: failure()
        run: |
          set -euo pipefail
          LOG="$NIGHTLY_LOG_DIR/run-failure-triage.log"
          exec > >(tee -a "$LOG") 2>&1

          scripts/summarize-nightly-failure.sh \
            "$NIGHTLY_LOG_DIR" \
            "$NIGHTLY_LOG_DIR/nightly-failure-triage.md"

          cat "$NIGHTLY_LOG_DIR/nightly-failure-triage.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload nightly execution log bundle
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nightly-strict-lsp-execution-logs
          path: ${{ env.NIGHTLY_LOG_DIR }}/**
          if-no-files-found: warn
