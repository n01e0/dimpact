name: Nightly Strict real-LSP E2E

on:
  schedule:
    # 03:00 JST (18:00 UTC)
    - cron: "0 18 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-strict-lsp-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TARGET_DIR: ${{ github.workspace }}/target
  CARGO_TERM_COLOR: always

jobs:
  strict_real_lsp_e2e:
    runs-on: ubuntu-latest
    container: ghcr.io/n01e0/dimpact-ci:latest
    steps:
      - uses: actions/checkout@v6

      - name: Cache CARGO_HOME
        uses: actions/cache@v4
        with:
          path: ~/.cargo
          key: ${{ runner.os }}-cargo-home-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install TypeScript/JavaScript language server
        run: |
          npm install -g typescript typescript-language-server
          typescript-language-server --help >/dev/null

      - name: Install Python language server
        run: |
          npm install -g pyright
          pyright-langserver --help >/dev/null

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      - name: Install Go language server
        run: |
          go install golang.org/x/tools/gopls@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          gopls version >/dev/null

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Java language server
        run: |
          mkdir -p "$HOME/.local/jdtls" "$HOME/.local/bin"
          curl -fsSL "https://download.eclipse.org/jdtls/snapshots/jdt-language-server-latest.tar.gz" -o /tmp/jdtls.tar.gz
          tar -xzf /tmp/jdtls.tar.gz -C "$HOME/.local/jdtls"

          JDTLS_BIN="$(find "$HOME/.local/jdtls" -type f -name jdtls | head -n 1)"
          if [ -z "$JDTLS_BIN" ]; then
            echo "jdtls binary not found after extraction" >&2
            exit 1
          fi
          chmod +x "$JDTLS_BIN"
          ln -sf "$JDTLS_BIN" "$HOME/.local/bin/jdtls"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          jdtls --help >/dev/null

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"

      - name: Install Ruby language server
        run: |
          gem install ruby-lsp --no-document
          ruby-lsp --help >/dev/null

      - name: Run strict real-LSP engine_lsp suite (env-gated)
        env:
          DIMPACT_E2E_STRICT_LSP: "1"
        run: |
          set -o pipefail
          echo "::group::cargo test -q --test engine_lsp (strict real-LSP, env-gated)"
          cargo test -q --test engine_lsp 2>&1 | tee engine-lsp-strict-e2e.log
          status=${PIPESTATUS[0]}
          echo "::endgroup::"
          exit $status

      - name: Summarize strict E2E failure logs
        if: failure()
        run: |
          {
            echo "## strict real-LSP engine_lsp failure summary"
            if [ -f engine-lsp-strict-e2e.log ]; then
              echo
              echo "### engine-lsp-strict-e2e.log (tail -n 200)"
              echo '```'
              tail -n 200 engine-lsp-strict-e2e.log
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload strict E2E log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-strict-lsp-logs
          path: engine-lsp-strict-e2e.log
          if-no-files-found: warn
