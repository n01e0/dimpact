name: Nightly Strict real-LSP E2E

on:
  schedule:
    # 03:00 JST (18:00 UTC)
    - cron: "0 18 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-strict-lsp-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TARGET_DIR: ${{ github.workspace }}/target
  CARGO_TERM_COLOR: always
  NIGHTLY_LOG_DIR: ${{ github.workspace }}/nightly-logs
  # Lane-level strict real-LSP policy (fail-fast promotion order).
  # Q54-4 promotes Ruby/Python, completing fail-fast promotion for all strict lanes.
  STRICT_LSP_ACTIVE_LANES: "go,typescript,javascript,java,ruby,python"

jobs:
  strict_real_lsp_e2e:
    runs-on: ubuntu-latest
    container: ghcr.io/n01e0/dimpact-ci:latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Ensure base tools (git/bash/python3/nodejs/npm/ripgrep)
        shell: sh
        run: |
          if command -v apt-get >/dev/null 2>&1; then
            apt-get update
            DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
              git bash python3 nodejs npm ripgrep ca-certificates curl openjdk-17-jre-headless ruby-full build-essential
          elif command -v apk >/dev/null 2>&1; then
            apk add --no-cache git bash python3 nodejs npm ripgrep ca-certificates curl openjdk17-jre ruby ruby-dev build-base
          elif command -v yum >/dev/null 2>&1; then
            yum install -y git bash python3 nodejs npm ripgrep ca-certificates curl java-17-openjdk-headless ruby ruby-devel gcc gcc-c++ make
          else
            echo "no supported package manager found to install required base tools" >&2
            exit 1
          fi

      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Prepare nightly log directory
        run: |
          set -euo pipefail
          mkdir -p "$NIGHTLY_LOG_DIR"

      - name: Cache CARGO_HOME
        uses: actions/cache@v4
        with:
          path: ~/.cargo
          key: ${{ runner.os }}-cargo-home-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}

      - name: Install + health-check TypeScript/JavaScript language server
        id: install_ts_js
        continue-on-error: true
        run: |
          set -euo pipefail
          LOG="$NIGHTLY_LOG_DIR/install-ts-js.log"
          exec > >(tee -a "$LOG") 2>&1

          if ! node -v >/dev/null 2>&1 || ! npm -v >/dev/null 2>&1; then
            echo "::error::[ts/js] node/npm runtime not executable"
            echo "[ts/js] PATH=$PATH"
            exit 1
          fi

          echo "[ts/js] node=$(node -v) npm=$(npm -v)"

          install_ts_js() {
            npm install -g --no-audit --no-fund typescript@latest typescript-language-server@latest
          }

          if ! install_ts_js; then
            echo "[ts/js] first npm install failed, retrying once after npm cache clean"
            npm cache clean --force || true
            if ! install_ts_js; then
              echo "::error::[ts/js] npm install failed (typescript/typescript-language-server) after retry"
              exit 1
            fi
          fi

          if ! command -v typescript-language-server >/dev/null 2>&1; then
            echo "::error::[ts/js] typescript-language-server not found in PATH after install"
            exit 1
          fi

          echo "[ts/js] typescript-language-server path=$(command -v typescript-language-server)"
          if ! typescript-language-server --help >/tmp/typescript-language-server-help.log 2>&1; then
            echo "::error::[ts/js] typescript-language-server --help failed"
            cat /tmp/typescript-language-server-help.log >&2
            exit 1
          fi
          echo "[ts/js] health-check=ok"

      - name: Install + health-check Python language server
        id: install_python
        continue-on-error: true
        run: |
          set -euo pipefail
          LOG="$NIGHTLY_LOG_DIR/install-python.log"
          exec > >(tee -a "$LOG") 2>&1

          if ! node -v >/dev/null 2>&1 || ! npm -v >/dev/null 2>&1; then
            echo "::error::[python] node/npm runtime not executable"
            echo "[python] PATH=$PATH"
            exit 1
          fi

          echo "[python] node=$(node -v) npm=$(npm -v)"

          install_pyright() {
            npm install -g --no-audit --no-fund pyright@latest
          }

          if ! install_pyright; then
            echo "[python] first npm install failed, retrying once after npm cache clean"
            npm cache clean --force || true
            if ! install_pyright; then
              echo "::error::[python] npm install failed (pyright) after retry"
              exit 1
            fi
          fi

          if ! command -v pyright-langserver >/dev/null 2>&1; then
            echo "::error::[python] pyright-langserver not found in PATH after install"
            exit 1
          fi
          if ! command -v pyright >/dev/null 2>&1; then
            echo "::error::[python] pyright CLI not found in PATH after install"
            exit 1
          fi

          echo "[python] pyright-langserver path=$(command -v pyright-langserver)"
          if ! pyright --version >/tmp/pyright-version.log 2>&1; then
            echo "::error::[python] pyright --version failed"
            cat /tmp/pyright-version.log >&2
            exit 1
          fi
          echo "[python] pyright version=$(cat /tmp/pyright-version.log | head -n 1)"
          echo "[python] health-check=ok"

      - uses: actions/setup-go@v6
        with:
          go-version: "1.22.x"

      - name: Install + health-check Go language server
        id: install_go
        continue-on-error: true
        run: |
          set -euo pipefail
          LOG="$NIGHTLY_LOG_DIR/install-go.log"
          exec > >(tee -a "$LOG") 2>&1
          echo "[go] go=$(go version)"

          if ! GOTOOLCHAIN=auto go install golang.org/x/tools/gopls@latest; then
            echo "::error::[go] go install failed (gopls@latest)"
            exit 1
          fi

          GOBIN="$(go env GOPATH)/bin"
          export PATH="$GOBIN:$PATH"
          echo "$GOBIN" >> "$GITHUB_PATH"

          if ! command -v gopls >/dev/null 2>&1; then
            echo "::error::[go] gopls not found in PATH after install"
            exit 1
          fi

          echo "[go] gopls path=$(command -v gopls)"
          if ! gopls version >/tmp/gopls-version.log 2>&1; then
            echo "::error::[go] gopls version failed"
            cat /tmp/gopls-version.log >&2
            exit 1
          fi
          cat /tmp/gopls-version.log
          echo "[go] health-check=ok"

      - name: Install + health-check Java language server
        id: install_java
        continue-on-error: true
        run: |
          set -euo pipefail
          LOG="$NIGHTLY_LOG_DIR/install-java.log"
          exec > >(tee -a "$LOG") 2>&1
          echo "[java] java=$(java -version 2>&1 | head -n 1)"

          mkdir -p "$HOME/.local/jdtls" "$HOME/.local/bin"
          if ! curl --retry 3 --retry-delay 2 --retry-all-errors -fsSL \
            "https://download.eclipse.org/jdtls/snapshots/jdt-language-server-latest.tar.gz" \
            -o /tmp/jdtls.tar.gz; then
            echo "::error::[java] failed to download jdtls snapshot tarball"
            exit 1
          fi

          if ! tar -xzf /tmp/jdtls.tar.gz -C "$HOME/.local/jdtls"; then
            echo "::error::[java] failed to extract /tmp/jdtls.tar.gz"
            exit 1
          fi

          JDTLS_BIN="$(find "$HOME/.local/jdtls" -type f -name jdtls | head -n 1)"
          if [ -z "$JDTLS_BIN" ]; then
            echo "::error::[java] jdtls binary not found after extraction"
            find "$HOME/.local/jdtls" -maxdepth 3 -type f | head -n 50 >&2 || true
            exit 1
          fi

          chmod +x "$JDTLS_BIN"
          ln -sf "$JDTLS_BIN" "$HOME/.local/bin/jdtls"
          export PATH="$HOME/.local/bin:$PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

          if ! command -v jdtls >/dev/null 2>&1; then
            echo "::error::[java] jdtls not found in PATH after install"
            exit 1
          fi

          echo "[java] jdtls path=$(command -v jdtls)"
          if ! jdtls --help >/tmp/jdtls-help.log 2>&1; then
            echo "::error::[java] jdtls --help failed"
            cat /tmp/jdtls-help.log >&2
            exit 1
          fi
          echo "[java] health-check=ok"

      - name: Install + health-check Ruby language server
        id: install_ruby
        continue-on-error: true
        run: |
          set -euo pipefail
          LOG="$NIGHTLY_LOG_DIR/install-ruby.log"
          exec > >(tee -a "$LOG") 2>&1
          echo "[ruby] ruby=$(ruby -v) gem=$(gem --version)"
          if command -v make >/dev/null 2>&1; then
            echo "[ruby] make=$(make --version | head -n 1)"
          else
            echo "[ruby] make=missing"
          fi
          if command -v gcc >/dev/null 2>&1; then
            echo "[ruby] gcc=$(gcc --version | head -n 1)"
          else
            echo "[ruby] gcc=missing"
          fi

          install_ruby_lsp() {
            gem install ruby-lsp --no-document
          }

          ruby_lsp_healthcheck() {
            if ! command -v ruby-lsp >/dev/null 2>&1; then
              echo "::error::[ruby] ruby-lsp not found in PATH after install"
              return 1
            fi

            echo "[ruby] ruby-lsp path=$(command -v ruby-lsp)"
            if ! ruby-lsp --version >/tmp/ruby-lsp-version.log 2>&1; then
              echo "::error::[ruby] ruby-lsp --version failed"
              cat /tmp/ruby-lsp-version.log >&2
              return 1
            fi

            if ! ruby-lsp --help >/tmp/ruby-lsp-help.log 2>&1; then
              echo "::error::[ruby] ruby-lsp --help failed"
              cat /tmp/ruby-lsp-help.log >&2
              return 1
            fi

            echo "[ruby] ruby-lsp version=$(head -n 1 /tmp/ruby-lsp-version.log)"
            echo "[ruby] health-check=ok"
          }

          if ! install_ruby_lsp; then
            echo "[ruby] first gem install failed, retrying once"
            if ! install_ruby_lsp; then
              echo "phase=install" >> "$GITHUB_OUTPUT"
              echo "::error::[ruby] gem install failed (ruby-lsp) after retry"
              exit 1
            fi
          fi

          if ! ruby_lsp_healthcheck; then
            echo "phase=healthcheck" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "phase=success" >> "$GITHUB_OUTPUT"

      - name: Preflight strict real-LSP targets (skip-safe)
        id: preflight
        run: |
          set -euo pipefail
          LOG="$NIGHTLY_LOG_DIR/preflight.log"
          exec > >(tee -a "$LOG") 2>&1

          PRE_LOG="$NIGHTLY_LOG_DIR/engine-lsp-strict-preflight.log"
          : > "$PRE_LOG"

          ts_install='${{ steps.install_ts_js.outcome }}'
          py_install='${{ steps.install_python.outcome }}'
          go_install='${{ steps.install_go.outcome }}'
          java_install='${{ steps.install_java.outcome }}'
          ruby_install='${{ steps.install_ruby.outcome }}'
          ruby_phase='${{ steps.install_ruby.outputs.phase }}'

          active_lanes=",${STRICT_LSP_ACTIVE_LANES:-go,typescript,javascript,java,ruby,python},"
          lane_allowed() {
            local lane="$1"
            [[ "$active_lanes" == *",${lane},"* ]]
          }

          enabled_count=0
          ts_enabled=0
          js_enabled=0
          go_enabled=0
          java_enabled=0
          ruby_enabled=0
          py_enabled=0

          set_gate_enabled() {
            local key="$1" reason="$2"
            printf -v "$key" '%s' "1"
            export "$key"
            echo "${key}=1" >> "$GITHUB_ENV"
            echo "${key}=1 reason=${reason}" >> "$PRE_LOG"
            enabled_count=$((enabled_count + 1))
          }

          set_gate_unset() {
            local key="$1" reason="$2"
            unset "$key" || true
            echo "${key}=unset reason=${reason}" >> "$PRE_LOG"
          }

          has_cmd_help() {
            command -v "$1" >/dev/null 2>&1 && "$1" --help >/dev/null 2>&1
          }

          has_cmd_version() {
            command -v "$1" >/dev/null 2>&1 && "$1" version >/dev/null 2>&1
          }

          # Keep global strict gate unset in lane-only mode and control execution by per-language gates.
          set_gate_unset "DIMPACT_E2E_STRICT_LSP" "lane-only mode (global strict gate unset)"
          if has_cmd_help rust-analyzer; then
            rust_reason="rust-analyzer available (lane-only mode)"
          else
            rust_reason="rust-analyzer missing (lane-only mode)"
          fi

          if lane_allowed "typescript"; then
            if [ "$ts_install" = "success" ] && has_cmd_help typescript-language-server; then
              ts_reason="typescript-language-server available (install=${ts_install})"
              set_gate_enabled "DIMPACT_E2E_STRICT_LSP_TYPESCRIPT" "$ts_reason"
              ts_enabled=1
            else
              ts_reason="typescript-language-server unavailable or install failed (install=${ts_install})"
              set_gate_unset "DIMPACT_E2E_STRICT_LSP_TYPESCRIPT" "$ts_reason"
            fi
          else
            ts_reason="disabled by STRICT_LSP_ACTIVE_LANES policy (active=${STRICT_LSP_ACTIVE_LANES:-go,typescript,javascript,java,ruby,python})"
            set_gate_unset "DIMPACT_E2E_STRICT_LSP_TYPESCRIPT" "$ts_reason"
          fi

          if lane_allowed "javascript"; then
            if [ "$ts_install" = "success" ] && has_cmd_help typescript-language-server; then
              js_reason="typescript-language-server available (install=${ts_install})"
              set_gate_enabled "DIMPACT_E2E_STRICT_LSP_JAVASCRIPT" "$js_reason"
              js_enabled=1
            else
              js_reason="typescript-language-server unavailable or install failed (install=${ts_install})"
              set_gate_unset "DIMPACT_E2E_STRICT_LSP_JAVASCRIPT" "$js_reason"
            fi
          else
            js_reason="disabled by STRICT_LSP_ACTIVE_LANES policy (active=${STRICT_LSP_ACTIVE_LANES:-go,typescript,javascript,java,ruby,python})"
            set_gate_unset "DIMPACT_E2E_STRICT_LSP_JAVASCRIPT" "$js_reason"
          fi

          if lane_allowed "go"; then
            if [ "$go_install" = "success" ] && has_cmd_version gopls; then
              go_reason="gopls available (install=${go_install})"
              set_gate_enabled "DIMPACT_E2E_STRICT_LSP_GO" "$go_reason"
              go_enabled=1
            else
              go_reason="gopls unavailable or install failed (install=${go_install})"
              set_gate_unset "DIMPACT_E2E_STRICT_LSP_GO" "$go_reason"
            fi
          else
            go_reason="disabled by STRICT_LSP_ACTIVE_LANES policy (active=${STRICT_LSP_ACTIVE_LANES:-go,typescript,javascript,java,ruby,python})"
            set_gate_unset "DIMPACT_E2E_STRICT_LSP_GO" "$go_reason"
          fi

          if lane_allowed "java"; then
            if [ "$java_install" = "success" ] && has_cmd_help jdtls; then
              java_reason="jdtls available (install=${java_install})"
              set_gate_enabled "DIMPACT_E2E_STRICT_LSP_JAVA" "$java_reason"
              java_enabled=1
            else
              java_reason="jdtls unavailable or install failed (install=${java_install})"
              set_gate_unset "DIMPACT_E2E_STRICT_LSP_JAVA" "$java_reason"
            fi
          else
            java_reason="disabled by STRICT_LSP_ACTIVE_LANES policy (active=${STRICT_LSP_ACTIVE_LANES:-go,typescript,javascript,java,ruby,python})"
            set_gate_unset "DIMPACT_E2E_STRICT_LSP_JAVA" "$java_reason"
          fi

          if lane_allowed "ruby"; then
            if [ "$ruby_install" = "success" ] && has_cmd_help ruby-lsp; then
              ruby_reason="ruby-lsp available (install=${ruby_install} phase=${ruby_phase:-success})"
              set_gate_enabled "DIMPACT_E2E_STRICT_LSP_RUBY" "$ruby_reason"
              ruby_enabled=1
            else
              if [ "${ruby_phase:-unknown}" = "healthcheck" ]; then
                ruby_reason="ruby-lsp install completed but health-check failed (install=${ruby_install} phase=${ruby_phase:-unknown})"
              else
                ruby_reason="ruby-lsp unavailable or install failed (install=${ruby_install} phase=${ruby_phase:-unknown})"
              fi
              set_gate_unset "DIMPACT_E2E_STRICT_LSP_RUBY" "$ruby_reason"
            fi
          else
            ruby_reason="disabled by STRICT_LSP_ACTIVE_LANES policy (active=${STRICT_LSP_ACTIVE_LANES:-go,typescript,javascript,java,ruby,python})"
            set_gate_unset "DIMPACT_E2E_STRICT_LSP_RUBY" "$ruby_reason"
          fi

          if lane_allowed "python"; then
            if [ "$py_install" = "success" ] && has_cmd_help pyright-langserver; then
              python_reason="pyright-langserver available (install=${py_install})"
              set_gate_enabled "DIMPACT_E2E_STRICT_LSP_PYTHON" "$python_reason"
              py_enabled=1
            else
              python_reason="pyright-langserver unavailable or install failed (install=${py_install})"
              set_gate_unset "DIMPACT_E2E_STRICT_LSP_PYTHON" "$python_reason"
            fi
          else
            python_reason="disabled by STRICT_LSP_ACTIVE_LANES policy (active=${STRICT_LSP_ACTIVE_LANES:-go,typescript,javascript,java,ruby,python})"
            set_gate_unset "DIMPACT_E2E_STRICT_LSP_PYTHON" "$python_reason"
          fi

          strict_lsp_any=0
          if [ "$enabled_count" -gt 0 ]; then
            strict_lsp_any=1
          fi

          {
            echo "strict_lsp_any=${strict_lsp_any}"
            echo "strict_lsp_enabled_count=${enabled_count}"
            echo "strict_lsp_typescript=${ts_enabled}"
            echo "strict_lsp_javascript=${js_enabled}"
            echo "strict_lsp_go=${go_enabled}"
            echo "strict_lsp_java=${java_enabled}"
            echo "strict_lsp_ruby=${ruby_enabled}"
            echo "strict_lsp_python=${py_enabled}"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## strict real-LSP preflight"
            echo
            echo "| target | enabled | reason |"
            echo "|---|---:|---|"
            echo "| rust (global strict gate) | ${DIMPACT_E2E_STRICT_LSP:-unset} | ${rust_reason} |"
            echo "| typescript | ${DIMPACT_E2E_STRICT_LSP_TYPESCRIPT:-unset} | ${ts_reason} |"
            echo "| javascript | ${DIMPACT_E2E_STRICT_LSP_JAVASCRIPT:-unset} | ${js_reason} |"
            echo "| go | ${DIMPACT_E2E_STRICT_LSP_GO:-unset} | ${go_reason} |"
            echo "| java | ${DIMPACT_E2E_STRICT_LSP_JAVA:-unset} | ${java_reason} |"
            echo "| ruby | ${DIMPACT_E2E_STRICT_LSP_RUBY:-unset} | ${ruby_reason} |"
            echo "| python | ${DIMPACT_E2E_STRICT_LSP_PYTHON:-unset} | ${python_reason} |"
            echo
            echo "active lane policy: ${STRICT_LSP_ACTIVE_LANES:-go,typescript,javascript,java,ruby,python}"
            echo "enabled strict lanes: ${enabled_count}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publish install/preflight stabilization summary
        if: always()
        run: |
          {
            echo "## install + preflight stabilization summary"
            echo
            echo "| lane | install outcome | preflight enabled |"
            echo "|---|---|---:|"
            echo "| ts/js | ${{ steps.install_ts_js.outcome }} | ts=${{ steps.preflight.outputs.strict_lsp_typescript }} js=${{ steps.preflight.outputs.strict_lsp_javascript }} |"
            echo "| python | ${{ steps.install_python.outcome }} | ${{ steps.preflight.outputs.strict_lsp_python }} |"
            echo "| go | ${{ steps.install_go.outcome }} | ${{ steps.preflight.outputs.strict_lsp_go }} |"
            echo "| java | ${{ steps.install_java.outcome }} | ${{ steps.preflight.outputs.strict_lsp_java }} |"
            echo "| ruby | ${{ steps.install_ruby.outcome }} | ${{ steps.preflight.outputs.strict_lsp_ruby }} |"
            echo
            echo "active lane policy: ${STRICT_LSP_ACTIVE_LANES:-go,typescript,javascript,java,ruby,python}"
            echo "strict lanes enabled count: ${{ steps.preflight.outputs.strict_lsp_enabled_count }}"
            echo "strict lanes any enabled: ${{ steps.preflight.outputs.strict_lsp_any }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Summarize strict real-LSP migration status + residual trend
        if: always()
        run: |
          set -euo pipefail
          PROGRESS_MD="$NIGHTLY_LOG_DIR/strict-e2e-migration-summary.md"
          RESIDUAL_AFTER_JSON="$NIGHTLY_LOG_DIR/strict-e2e-residual-after.json"
          RESIDUAL_AFTER_MD="$NIGHTLY_LOG_DIR/strict-e2e-residual-after.md"
          RESIDUAL_BEFORE_JSON="$NIGHTLY_LOG_DIR/strict-e2e-residual-before.json"
          RESIDUAL_TREND_MD="$NIGHTLY_LOG_DIR/strict-e2e-residual-trend.md"

          bash scripts/summarize-strict-e2e-migration-progress.sh tests/engine_lsp.rs "$PROGRESS_MD"
          bash scripts/summarize-strict-e2e-skips.sh tests/engine_lsp.rs "$RESIDUAL_AFTER_JSON" "$RESIDUAL_AFTER_MD"

          if git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            git show HEAD^:tests/engine_lsp.rs > /tmp/engine_lsp.prev.rs
            bash scripts/summarize-strict-e2e-skips.sh /tmp/engine_lsp.prev.rs "$RESIDUAL_BEFORE_JSON" /tmp/strict-e2e-residual-before.md
          else
            cp "$RESIDUAL_AFTER_JSON" "$RESIDUAL_BEFORE_JSON"
          fi

          python3 scripts/render-strict-e2e-residual-trend.py \
            "$RESIDUAL_BEFORE_JSON" \
            "$RESIDUAL_AFTER_JSON" \
            > "$RESIDUAL_TREND_MD"

          cat "$PROGRESS_MD" >> "$GITHUB_STEP_SUMMARY"
          cat "$RESIDUAL_AFTER_MD" >> "$GITHUB_STEP_SUMMARY"
          cat "$RESIDUAL_TREND_MD" >> "$GITHUB_STEP_SUMMARY"

      - name: Run strict real-LSP engine_lsp suite (env-gated)
        id: strict_e2e_initial
        continue-on-error: true
        run: |
          set -euo pipefail
          LOG="$NIGHTLY_LOG_DIR/run-engine-lsp-strict.log"
          exec > >(tee -a "$LOG") 2>&1

          STRICT_E2E_LOG="$NIGHTLY_LOG_DIR/engine-lsp-strict-e2e.log"
          echo "::group::cargo test -q --locked --test engine_lsp (strict real-LSP, env-gated)"
          set +e
          cargo test -q --locked --test engine_lsp 2>&1 | tee "$STRICT_E2E_LOG"
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -eq 0 ]; then
            echo "result=success" >> "$GITHUB_OUTPUT"
          else
            echo "result=failure" >> "$GITHUB_OUTPUT"
          fi
          echo "::endgroup::"
          exit $status

      - name: Summarize strict E2E failure logs
        if: failure()
        run: |
          STRICT_E2E_LOG="$NIGHTLY_LOG_DIR/engine-lsp-strict-e2e.log"
          {
            echo "## strict real-LSP engine_lsp failure summary"
            if [ -f "$STRICT_E2E_LOG" ]; then
              echo
              echo "### engine-lsp-strict-e2e.log (tail -n 200)"
              echo '```'
              tail -n 200 "$STRICT_E2E_LOG"
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"


      - name: Run LSP graduation auto-check script
        id: grad_check_initial
        if: always()
        continue-on-error: true
        run: |
          set -euo pipefail
          LOG="$NIGHTLY_LOG_DIR/run-graduation-check.log"
          exec > >(tee -a "$LOG") 2>&1

          GRAD_LOG="$NIGHTLY_LOG_DIR/lsp-graduation-check.log"
          set +e
          scripts/verify-lsp-graduation.sh --skip-regression 2>&1 | tee "$GRAD_LOG"
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -eq 0 ]; then
            echo "result=success" >> "$GITHUB_OUTPUT"
          else
            echo "result=failure" >> "$GITHUB_OUTPUT"
          fi
          exit $status

      - name: Publish LSP graduation check summary
        if: always()
        run: |
          GRAD_LOG="$NIGHTLY_LOG_DIR/lsp-graduation-check.log"
          {
            echo "## LSP graduation auto-check summary"
            if [ -f "$GRAD_LOG" ]; then
              echo
              echo "### Result"
              if grep -E '^PASS=[0-9]+ FAIL=[0-9]+' "$GRAD_LOG" >/dev/null; then
                grep -E '^PASS=[0-9]+ FAIL=[0-9]+' "$GRAD_LOG"
              else
                echo "PASS/FAIL summary line not found"
              fi
              echo
              echo "### Full check log (tail -n 200)"
              echo '```'
              tail -n 200 "$GRAD_LOG"
              echo '```'
            else
              echo "graduation check log missing"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Classify nightly flaky causes
        if: always()
        run: |
          set -euo pipefail
          LOG="$NIGHTLY_LOG_DIR/run-flaky-classifier.log"
          exec > >(tee -a "$LOG") 2>&1

          scripts/classify-nightly-flaky.sh \
            "$NIGHTLY_LOG_DIR" \
            "$NIGHTLY_LOG_DIR/nightly-flaky-classification.json" \
            "$NIGHTLY_LOG_DIR/nightly-flaky-classification.md"

          cat "$NIGHTLY_LOG_DIR/nightly-flaky-classification.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Decide flaky-type retry policy
        id: retry_policy
        if: always()
        run: |
          set -euo pipefail
          LOG="$NIGHTLY_LOG_DIR/retry-policy.log"
          exec > >(tee -a "$LOG") 2>&1

          CLASS_JSON="$NIGHTLY_LOG_DIR/nightly-flaky-classification.json"
          python3 - "$CLASS_JSON" <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          p = Path(sys.argv[1])
          if p.exists():
              d = json.loads(p.read_text())
              totals = d.get("totals", {})
          else:
              totals = {}

          install = int(totals.get("install", 0))
          startup = int(totals.get("startup", 0))
          capability = int(totals.get("capability", 0))
          timeout = int(totals.get("timeout", 0))

          retry_install = install > 0
          retry_startup = startup > 0
          retry_timeout = timeout > 0
          retry_capability = capability > 0

          # Policy:
          # - install/startup/timeout: retry once
          # - capability-only: no retry (non-transient by default)
          retry_enabled = retry_install or retry_startup or retry_timeout

          out = Path(os.environ["GITHUB_OUTPUT"])
          with out.open("a", encoding="utf-8") as f:
              def w(k, v):
                  f.write(f"{k}={v}\n")
              w("install", "1" if retry_install else "0")
              w("startup", "1" if retry_startup else "0")
              w("capability", "1" if retry_capability else "0")
              w("timeout", "1" if retry_timeout else "0")
              w("enabled", "1" if retry_enabled else "0")

          print(f"retry_policy install={int(retry_install)} startup={int(retry_startup)} capability={int(retry_capability)} timeout={int(retry_timeout)} enabled={int(retry_enabled)}")
          PY


      - name: Publish flaky-type retry policy summary
        if: always()
        run: |
          {
            echo "## flaky-type retry policy"
            echo
            echo "| type | count>0 | auto-retry |"
            echo "|---|---:|---:|"
            echo "| install | ${{ steps.retry_policy.outputs.install }} | ${{ steps.retry_policy.outputs.install }} |"
            echo "| startup | ${{ steps.retry_policy.outputs.startup }} | ${{ steps.retry_policy.outputs.startup }} |"
            echo "| capability | ${{ steps.retry_policy.outputs.capability }} | 0 |"
            echo "| timeout | ${{ steps.retry_policy.outputs.timeout }} | ${{ steps.retry_policy.outputs.timeout }} |"
            echo
            echo "retry enabled: ${{ steps.retry_policy.outputs.enabled }}"
            echo "strict lanes any enabled (preflight): ${{ steps.preflight.outputs.strict_lsp_any }}"
            echo "strict lanes enabled count (preflight): ${{ steps.preflight.outputs.strict_lsp_enabled_count }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Retry setup actions for install/startup flaky types
        id: retry_setup
        if: always() && steps.retry_policy.outputs.enabled == '1' && (steps.retry_policy.outputs.install == '1' || steps.retry_policy.outputs.startup == '1')
        run: |
          set -euo pipefail
          LOG="$NIGHTLY_LOG_DIR/retry-setup.log"
          exec > >(tee -a "$LOG") 2>&1

          echo "[retry] install/startup retry path"

          npm install -g typescript typescript-language-server pyright || true
          GOTOOLCHAIN=auto go install golang.org/x/tools/gopls@latest || true

          mkdir -p "$HOME/.local/jdtls" "$HOME/.local/bin"
          curl --retry 2 --retry-delay 2 --retry-all-errors -fsSL \
            "https://download.eclipse.org/jdtls/snapshots/jdt-language-server-latest.tar.gz" \
            -o /tmp/jdtls-retry.tar.gz || true
          tar -xzf /tmp/jdtls-retry.tar.gz -C "$HOME/.local/jdtls" || true
          JDTLS_BIN="$(find "$HOME/.local/jdtls" -type f -name jdtls | head -n 1 || true)"
          if [ -n "$JDTLS_BIN" ]; then
            chmod +x "$JDTLS_BIN"
            ln -sf "$JDTLS_BIN" "$HOME/.local/bin/jdtls"
          fi

          ruby_lsp_healthcheck() {
            command -v ruby-lsp >/dev/null 2>&1 || return 1
            ruby-lsp --version >/tmp/ruby-lsp-retry-version.log 2>&1 || return 1
            ruby-lsp --help >/tmp/ruby-lsp-retry-help.log 2>&1 || return 1
          }

          ruby_retry_result="not-needed"
          if ruby_lsp_healthcheck; then
            echo "[retry][ruby] existing ruby-lsp passed health-check"
          else
            echo "[retry][ruby] retrying gem install + health-check"
            if gem install ruby-lsp --no-document && ruby_lsp_healthcheck; then
              if [ '${{ steps.install_ruby.outcome }}' != 'success' ]; then
                ruby_retry_result="recovered"
              else
                ruby_retry_result="healthcheck-recovered"
              fi
              echo "[retry][ruby] ruby-lsp health-check recovered"
            else
              ruby_retry_result="persistent-failure"
              echo "[retry][ruby] ruby-lsp retry did not recover"
            fi
          fi

          echo "ruby_install_result=$ruby_retry_result" >> "$GITHUB_OUTPUT"
          echo "retry-status: language=ruby category=install result=$ruby_retry_result"

          echo "[retry] setup retry completed (best effort)"

      - name: Retry strict real-LSP engine_lsp suite (policy-gated)
        id: strict_e2e_retry
        continue-on-error: true
        if: always() && steps.retry_policy.outputs.enabled == '1'
        run: |
          set -euo pipefail
          LOG="$NIGHTLY_LOG_DIR/run-engine-lsp-strict-retry.log"
          exec > >(tee -a "$LOG") 2>&1

          # Re-evaluate lane gates after retry setup so recovered installs can be exercised.
          # Keep the same stabilization lane policy as preflight.
          active_lanes=",${STRICT_LSP_ACTIVE_LANES:-go,typescript,javascript,java,ruby,python},"
          lane_allowed() {
            local lane="$1"
            [[ "$active_lanes" == *",${lane},"* ]]
          }

          set_lane_gate_if_available() {
            local lane="$1" key="$2" mode="$3" cmd="$4"
            if ! lane_allowed "$lane"; then
              unset "$key" || true
              return
            fi
            if [ "$mode" = "help" ]; then
              if command -v "$cmd" >/dev/null 2>&1 && "$cmd" --help >/dev/null 2>&1; then
                export "$key"="1"
                return
              fi
            else
              if command -v "$cmd" >/dev/null 2>&1 && "$cmd" version >/dev/null 2>&1; then
                export "$key"="1"
                return
              fi
            fi
            unset "$key" || true
          }

          set_lane_gate_if_available typescript DIMPACT_E2E_STRICT_LSP_TYPESCRIPT help typescript-language-server
          set_lane_gate_if_available javascript DIMPACT_E2E_STRICT_LSP_JAVASCRIPT help typescript-language-server
          set_lane_gate_if_available python DIMPACT_E2E_STRICT_LSP_PYTHON help pyright-langserver
          set_lane_gate_if_available go DIMPACT_E2E_STRICT_LSP_GO version gopls
          set_lane_gate_if_available java DIMPACT_E2E_STRICT_LSP_JAVA help jdtls
          set_lane_gate_if_available ruby DIMPACT_E2E_STRICT_LSP_RUBY help ruby-lsp

          echo "[retry] lane gates after setup: ts=${DIMPACT_E2E_STRICT_LSP_TYPESCRIPT:-unset} js=${DIMPACT_E2E_STRICT_LSP_JAVASCRIPT:-unset} py=${DIMPACT_E2E_STRICT_LSP_PYTHON:-unset} go=${DIMPACT_E2E_STRICT_LSP_GO:-unset} java=${DIMPACT_E2E_STRICT_LSP_JAVA:-unset} ruby=${DIMPACT_E2E_STRICT_LSP_RUBY:-unset}"

          STRICT_E2E_RETRY_LOG="$NIGHTLY_LOG_DIR/engine-lsp-strict-e2e-retry.log"
          echo "::group::cargo test -q --locked --test engine_lsp (strict real-LSP retry)"
          set +e
          cargo test -q --locked --test engine_lsp 2>&1 | tee "$STRICT_E2E_RETRY_LOG"
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -eq 0 ]; then
            echo "result=success" >> "$GITHUB_OUTPUT"
          else
            echo "result=failure" >> "$GITHUB_OUTPUT"
          fi
          echo "::endgroup::"
          exit $status

      - name: Retry LSP graduation auto-check (policy-gated)
        id: grad_check_retry
        if: always() && steps.retry_policy.outputs.enabled == '1'
        continue-on-error: true
        run: |
          set -euo pipefail
          LOG="$NIGHTLY_LOG_DIR/run-graduation-check-retry.log"
          exec > >(tee -a "$LOG") 2>&1

          GRAD_RETRY_LOG="$NIGHTLY_LOG_DIR/lsp-graduation-check-retry.log"
          set +e
          scripts/verify-lsp-graduation.sh --skip-regression 2>&1 | tee "$GRAD_RETRY_LOG"
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -eq 0 ]; then
            echo "result=success" >> "$GITHUB_OUTPUT"
          else
            echo "result=failure" >> "$GITHUB_OUTPUT"
          fi
          exit $status

      - name: Reclassify nightly flaky causes after retry absorption
        if: always()
        run: |
          set -euo pipefail
          LOG="$NIGHTLY_LOG_DIR/run-flaky-classifier-final.log"
          exec > >(tee -a "$LOG") 2>&1

          if [ -f "$NIGHTLY_LOG_DIR/nightly-flaky-classification.json" ]; then
            cp "$NIGHTLY_LOG_DIR/nightly-flaky-classification.json" "$NIGHTLY_LOG_DIR/nightly-flaky-classification-initial.json"
          fi
          if [ -f "$NIGHTLY_LOG_DIR/nightly-flaky-classification.md" ]; then
            cp "$NIGHTLY_LOG_DIR/nightly-flaky-classification.md" "$NIGHTLY_LOG_DIR/nightly-flaky-classification-initial.md"
          fi

          scripts/classify-nightly-flaky.sh \
            "$NIGHTLY_LOG_DIR" \
            "$NIGHTLY_LOG_DIR/nightly-flaky-classification.json" \
            "$NIGHTLY_LOG_DIR/nightly-flaky-classification.md"

          {
            echo
            echo "## final flaky classification after retry absorption"
            echo
            cat "$NIGHTLY_LOG_DIR/nightly-flaky-classification.md"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Finalize nightly result with retry policy
        if: always()
        env:
          INIT_STRICT_RESULT: ${{ steps.strict_e2e_initial.outputs.result }}
          INIT_STRICT_OUTCOME: ${{ steps.strict_e2e_initial.outcome }}
          INIT_GRAD_RESULT: ${{ steps.grad_check_initial.outputs.result }}
          INIT_GRAD_OUTCOME: ${{ steps.grad_check_initial.outcome }}
          RETRY_ENABLED: ${{ steps.retry_policy.outputs.enabled }}
          RETRY_STRICT_RESULT: ${{ steps.strict_e2e_retry.outputs.result }}
          RETRY_STRICT_OUTCOME: ${{ steps.strict_e2e_retry.outcome }}
          RETRY_GRAD_RESULT: ${{ steps.grad_check_retry.outputs.result }}
          RETRY_GRAD_OUTCOME: ${{ steps.grad_check_retry.outcome }}
        run: |
          set -euo pipefail
          python3 scripts/finalize-nightly-retry-result.py --summary-file "$GITHUB_STEP_SUMMARY"

      - name: Publish failure triage summary (cause/language/repro)
        if: failure()
        run: |
          set -euo pipefail
          LOG="$NIGHTLY_LOG_DIR/run-failure-triage.log"
          exec > >(tee -a "$LOG") 2>&1

          scripts/summarize-nightly-failure.sh \
            "$NIGHTLY_LOG_DIR" \
            "$NIGHTLY_LOG_DIR/nightly-failure-triage.md"

          cat "$NIGHTLY_LOG_DIR/nightly-failure-triage.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload nightly execution log bundle
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nightly-strict-lsp-execution-logs
          path: ${{ env.NIGHTLY_LOG_DIR }}/**
          if-no-files-found: warn
